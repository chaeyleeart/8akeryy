<!-- 상세 모달 -->
<div class="gal-modal" id="galModal" aria-hidden="true">
  <div class="gal-modal-bg" data-close></div>
  <div class="gal-modal-card" role="dialog" aria-modal="true">
    <button class="gal-modal-close" data-close aria-label="닫기">✕</button>
    <div class="gal-modal-media"><img id="mImg" src="" alt="" /></div>
    <div class="gal-modal-body">
      <div class="gal-modal-cat" id="mCat"></div>
      <h3 id="mTitle"></h3>
      <div class="gal-modal-date" id="mDate"></div>
      <p id="mBody"></p>
    </div>
  </div>
</div>

<script src="posts.js"></script>
<script src="main.js"></script>
<script>
  (function () {
    var grid = document.getElementById('galGrid');
    var filters = document.getElementById('galFilters');
    var posts = window.POSTS || [];
    var cats = ['전체'].concat(posts.map(function (p) { return p.category; })
      .filter(function (v, i, a) { return a.indexOf(v) === i; }));
    var active = '전체';

    function render() {
      grid.innerHTML = '';
      posts.filter(function (p) { return active === '전체' || p.category === active; })
        .forEach(function (p) {
          var card = document.createElement('button');
          card.className = 'gal-card';
          card.innerHTML =
            '<div class="gal-thumb ' + (p.fit === 'contain' ? 'is-contain' : '') + '">' +
              '<img src="' + p.image + '" alt="' + p.title + '" loading="lazy"/>' +
            '</div>' +
            '<div class="gal-meta">' +
              '<span class="gal-cat">' + p.category + '</span>' +
              '<h4>' + p.title + '</h4>' +
              '<span class="gal-date">' + p.date + '</span>' +
            '</div>';
          card.addEventListener('click', function () { openModal(p); });
          grid.appendChild(card);
        });
      if (window.gsap) gsap.from('.gal-card', { opacity: 0, y: 24, duration: .6, stagger: .06, ease: 'power3.out' });
    }

    function renderFilters() {
      cats.forEach(function (c) {
        var b = document.createElement('button');
        b.className = 'gal-filter' + (c === active ? ' on' : '');
        b.textContent = c;
        b.addEventListener('click', function () {
          active = c;
          [].forEach.call(filters.children, function (el) { el.classList.toggle('on', el.textContent === c); });
          render();
        });
        filters.appendChild(b);
      });
    }

    var modal = document.getElementById('galModal');
    function openModal(p) {
      document.getElementById('mImg').src = p.image;
      document.getElementById('mImg').className = (p.fit === 'contain' ? 'is-contain' : '');
      document.getElementById('mCat').textContent = p.category;
      document.getElementById('mTitle').textContent = p.title;
      document.getElementById('mDate').textContent = p.date;
      document.getElementById('mBody').innerHTML = (p.body || '').replace(/\n/g, '<br>');
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }
    function closeModal() { modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true'); }
    [].forEach.call(modal.querySelectorAll('[data-close]'), function (el) { el.addEventListener('click', closeModal); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

    renderFilters();
    render();
  })();
</script>
</body>
